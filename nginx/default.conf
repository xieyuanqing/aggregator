server {
    listen 80;
    server_name _;

    # Serve only static files from the mounted data dir
    root /usr/share/nginx/html;

    # IMPORTANT: EasyProxiesV2 subscription refresh may send conditional requests
    # (If-None-Match / If-Modified-Since). Some clients incorrectly treat 304 as
    # "empty subscription". Force 200 by disabling etag/if-modified-since.
    etag off;
    if_modified_since off;

    # Also discourage caching on the client side.
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    location / {
        try_files $uri =404;
    }
}
